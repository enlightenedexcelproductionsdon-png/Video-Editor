<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Video Editor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        #video-container {
            text-align: center;
            margin-bottom: 20px;
        }
        video {
            width: 80%;
            max-width: 600px;
            border: 1px solid #ccc;
        }
        #controls {
            margin-top: 10px;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }
        input[type="file"] {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Simple Video Editor</h1>

    <div id="video-container">
        <video id="video-player" controls>
            <source id="video-source" src="" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div id="controls">
            <button onclick="playVideo()">Play</button>
            <button onclick="pauseVideo()">Pause</button>
            <label for="volume">Volume:</label>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="1" onchange="changeVolume(this.value)">
        </div>
    </div>

    <input type="file" id="file-input" accept="video/*" onchange="loadVideo(event)">

    <script>
        function playVideo() {
            const video = document.getElementById('video-player');
            video.play();
        }

        function pauseVideo() {
            const video = document.getElementById('video-player');
            video.pause();
        }

        function changeVolume(value) {
            const video = document.getElementById('video-player');
            video.volume = value;
        }

        function loadVideo(event) {
            const video = document.getElementById('video-player');
            const source = document.getElementById('video-source');
            const file = event.target.files[0];
            const url = URL.createObjectURL(file);
            source.src = url;
            video.load();
        }
    </script>

</body>
</html>
